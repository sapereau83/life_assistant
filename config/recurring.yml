# Recurring jobs run by Solid Queue's supervisor (see bin/jobs / Procfile.dev).
#
# The daily rollover closes the day at midnight: every task still "todo" is
# moved into the "à valider" bucket for the next day you open the app.

shared: &shared
  daily_todo_rollover:
    class: DailyTodoRolloverJob
    queue: default
    schedule: "0 0 * * *" # every day at 00:00 (local time)

development:
  <<: *shared

production:
  <<: *shared
  clear_solid_queue_finished_jobs:
    command: "SolidQueue::Job.clear_finished_in_batches(sleep_between_batches: 0.3)"
    schedule: every hour at minute 12
