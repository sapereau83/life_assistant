fr:
  date:
    formats:
      default: "%d/%m/%Y"
      short: "%-d %b"
      long: "%A %-d %B %Y"
    day_names: [dimanche, lundi, mardi, mercredi, jeudi, vendredi, samedi]
    abbr_day_names: [dim, lun, mar, mer, jeu, ven, sam]
    month_names: [~, janvier, février, mars, avril, mai, juin, juillet, août, septembre, octobre, novembre, décembre]
    abbr_month_names: [~, janv., févr., mars, avr., mai, juin, juil., août, sept., oct., nov., déc.]
  time:
    formats:
      default: "%d/%m/%Y %H:%M"
      short: "%-d %b %H:%M"
      long: "%A %-d %B %Y %H:%M"
  number:
    format:
      separator: ","
      delimiter: " "
  errors:
    format: "%{attribute} %{message}"
    messages:
      blank: "est obligatoire"
      present: "doit être vide"
      too_long:
        one: "est trop long (1 caractère maximum)"
        other: "est trop long (%{count} caractères maximum)"
      too_short:
        one: "est trop court (1 caractère minimum)"
        other: "est trop court (%{count} caractères minimum)"
      taken: "est déjà utilisé"
      invalid: "n'est pas valide"
      confirmation: "ne concorde pas"
      inclusion: "n'est pas inclus dans la liste"
      exclusion: "n'est pas disponible"
      accepted: "doit être accepté"
      not_a_number: "n'est pas un nombre"
      greater_than: "doit être supérieur à %{count}"
      greater_than_or_equal_to: "doit être supérieur ou égal à %{count}"
      less_than: "doit être inférieur à %{count}"
      less_than_or_equal_to: "doit être inférieur ou égal à %{count}"
      other_than: "doit être différent de %{count}"
  activerecord:
    errors:
      messages:
        record_invalid: "La validation a échoué : %{errors}"
      models:
        task:
          attributes:
            title:
              blank: "est obligatoire"
    models:
      task:
        one: "tâche"
        other: "tâches"
    attributes:
      task:
        title: "Titre"
